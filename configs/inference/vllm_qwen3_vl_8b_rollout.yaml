base_model: /mnt/shared-storage-user/mineru2-shared/zengweijun/Wmh/MLLMs/qwen3-vl-8b-Instruct
torch_dtype: bfloat16
attn_implementation: flash_attention_3

server:
  mode: colocate
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9

client:
  max_tokens: 1024
  max_total_images: 28
  max_seq_length: 8192
  keep_recent_text_messages: 20
  keep_recent_tool_image_messages: 0
  max_image_side: 640
  max_image_pixels: 0
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  guided_decoding_regex: ""

initial_observation:
  mode: explicit_first_scan
  scan_num_frames: 8
  scan_purpose: global_overview
  protect_from_visual_budget: true
  error_on_seq_prune: true

io:
  data_path: /abs/path/to/raw_saver_agent_eval.jsonl
  output_path: artifacts/vllm/qwen3_vl_8b_rollout.jsonl
  data_root: /abs/path/to/videos
  include_splits: val
  start_index: 0
  count: 0
  log_dir: artifacts/vllm/logs

rollout:
  max_turns: 12
  rollout_batch_size: 4
  progress_every: 10
  proposal_model_path: /abs/path/to/proposal_model
