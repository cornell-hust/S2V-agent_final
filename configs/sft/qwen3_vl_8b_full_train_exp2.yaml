run_name: qwen3_vl_8b_full_sft_ds8
output_dir: artifacts/sft/qwen3_vl_8b_full

model_config: configs/model/qwen3_vl_8b_full.yaml
attention_config: configs/model/attention_fa3_only.yaml
deepspeed_config: configs/deepspeed/zero3_full_model.json

data:
  prepared_data_path: /abs/path/to/sft_train.compact_trace_v5.jsonl
  include_splits: train
  num_workers: 8
  dataloader_prefetch_factor: 2
  dataloader_persistent_workers: true

proposal:
  model_path: /abs/path/to/proposal_model
  torch_dtype: auto
  device: ""

initial_observation:
  mode: explicit_first_scan
  scan_num_frames: 8
  scan_purpose: global_overview
  protect_from_visual_budget: true
  error_on_seq_prune: true

prompt:
  initial_user_template: |
    Case ID: {public_case_id}
    Scene: {scene}
    Duration (sec): {duration}
    Task: {task_prompt}
    Success Criteria:
    {criteria_text}
  explicit_first_scan_instruction: |
    Before any targeted search or verification, call scan_timeline once over the initial scan window with purpose="global_overview" to build the canonical first observation. Use that overview to decide the next step.
  tool_response_template: |
    Selected frames: {timestamps}.
    Choose exactly one next step.
    Usually call seek_evidence for another stage or verify_hypothesis to judge sufficiency.
    Call finalize_case only when the gathered evidence is already sufficient.
    When finalizing, prioritize a compact finalize_case that closes cleanly.
    If optional summary, rationale, event_chain_summary, or qa_focus_answers would make the tool call too long, omit them.
    Do not answer before finalize_case returns.

rollout_trace:
  record_observation_content: false
  record_state_deltas: true
  record_counterfactual_trace: true
  record_message_history: true

optimization:
  epochs: 3
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.10
  lr_scheduler_type: cosine
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  keep_recent_text_messages: 20
  keep_recent_tool_image_messages: 0
  use_sample_weights: true

logging:
  log_every_n_steps: 10
  save_every_n_steps: 500
  save_total_limit: 2
  report_to:
    - wandb
  log_dir: artifacts/sft/qwen3_vl_8b_full/logs
  rollout_eval_output_dir: artifacts/sft/qwen3_vl_8b_full/rollout_eval

distributed:
  seed: 42
  nnodes: 1
  nproc_per_node: 8
  ddp_find_unused_parameters: false
  bf16: true
