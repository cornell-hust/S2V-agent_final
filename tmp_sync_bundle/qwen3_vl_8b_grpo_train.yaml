run_name: qwen3_vl_8b_grpo_ds8
output_dir: artifacts/rl/qwen3_vl_8b_grpo

model_config: configs/model/qwen3_vl_8b_full.yaml
attention_config: configs/model/attention_fa3_only.yaml
deepspeed_config: configs/deepspeed/zero3_full_model.json

policy_init_from: /abs/path/to/sft_checkpoint
reference_model: ""
rollout_backend: vllm
rollout_config: configs/rollout_eval/vllm_qwen3_vl_8b_rl_lowmem.yaml

data:
  train_manifest: /abs/path/to/rl_train.jsonl
  eval_manifest: /abs/path/to/rl_eval.jsonl
  materialized_train_items_path: /abs/path/to/rl_train.materialized_items_v5.jsonl
  materialized_eval_items_path: /abs/path/to/rl_eval.materialized_items_v5.jsonl
  require_materialized_runtime_cache: true
  data_root: /abs/path/to/data_root
  eval_data_root: /abs/path/to/data_root
  include_splits: train
  eval_include_splits: test

proposal:
  model_path: /abs/path/to/proposal_model
  torch_dtype: float16
  device: ""
  eval_model_path: /abs/path/to/proposal_model
  eval_torch_dtype: float16
  eval_device: ""

initial_observation:
  mode: explicit_first_scan
  scan_num_frames: 8
  scan_purpose: global_overview
  protect_from_visual_budget: true
  error_on_seq_prune: true

optimization:
  num_iterations: 80
  learning_rate: 4.0e-7
  per_device_batch_size: 1
  min_weight: 0.01
  advantage_clip: 3.0
  ppo_clip_epsilon: 0.2
  kl_beta: 0.0
  rollout_count: 8
  num_generations: 4
  rollout_max_turns: 10
  policy_do_sample: true
  policy_temperature: 0.8
  policy_top_p: 0.95
  policy_top_k: 50
  policy_repetition_penalty: 1.02
  keep_recent_text_messages: 20
  keep_recent_tool_image_messages: 3
  max_tool_message_frames: 4
  max_total_video_frames: 16
  gradient_accumulation_steps: 4
  dataloader_num_workers: 4
  dataloader_prefetch_factor: 2
  dataloader_persistent_workers: false
  compute_loss_microbatch_size: 4
  rl_steps_per_generation: 1
  rollout_stage_batch_size: 8
  vllm_max_num_seqs: 3
  vllm_fallback_max_num_seqs: 2

distributed:
  seed: 42
  nnodes: 1
  nproc_per_node: 8
  bf16: true

logging:
  inline_rollout_eval: true
  rollout_eval_start_iteration: 20
  rollout_eval_interval_iterations: 20
  final_rollout_eval: true

rewards:
  reward_version: timesearch_v4
  accuracy_reward_weight: 1.0
  protocol_finalize_reward_weight: 0.05
  stage_necessity_reward_weight: 0.15
  query_alignment_reward_weight: 0.10
  efficiency_reward_weight: 0.05
